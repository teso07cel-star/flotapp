<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlotApp - Mockup HUD v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .glow-green {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .float-anim {
            animation: subtle-float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center p-6 min-h-screen">
    
    <div class="max-w-md w-full space-y-10">
        <!-- HEADER -->
        <div class="text-center space-y-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black text-green-400 uppercase tracking-[0.3em]">Protocolo Cumplido</span>
            </div>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] italic opacity-70">
                Transmitido desde nodo operacional 02:41
            </p>
        </div>

        <!-- MOCKUP START -->
        
        <!-- SECTION: PICKUP -->
        <div class="space-y-4">
            <h2 class="text-xs font-black text-blue-500 uppercase tracking-[0.5em] px-2">Pickup (3 Sucursales)</h2>
            
            <!-- BRANCH CARD: SAN MARTIN -->
            <div class="glass p-5 rounded-[2.5rem] relative overflow-hidden group">
                <div class="absolute -top-10 -right-10 w-24 h-24 bg-blue-500/10 blur-3xl"></div>
                <div class="flex justify-between items-center mb-4 pl-2">
                    <p class="font-black text-sm uppercase tracking-tight">Sucursal: <span class="text-blue-400 text-lg">San Martin</span></p>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="bg-[#1e3a8a] hover:bg-[#1d4ed8] text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 glow-blue">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/66/Waze_icon.svg" class="w-6 h-6" alt="Waze">
                        <span class="text-[8px] font-black uppercase tracking-widest">WAZE</span>
                    </button>
                    <button class="bg-[#059669] hover:bg-[#059669]/80 text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 glow-green">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6" alt="WA">
                        <span class="text-[8px] font-black uppercase tracking-widest">NORTE</span>
                    </button>
                    <button class="bg-[#059669] hover:bg-[#059669]/80 text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 glow-green">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6" alt="WA">
                        <span class="text-[8px] font-black uppercase tracking-widest">S.TELMO</span>
                    </button>
                </div>
            </div>

            <!-- BRANCH CARD: VICENTE LOPEZ -->
            <div class="glass p-5 rounded-[2.5rem] relative overflow-hidden opacity-60">
                <div class="flex justify-between items-center mb-4 pl-2">
                    <p class="font-black text-sm uppercase tracking-tight">Sucursal: <span class="text-blue-400 text-lg">Vicente Lopez</span></p>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="bg-[#1e3a8a] text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1"><img src="https://upload.wikimedia.org/wikipedia/commons/6/66/Waze_icon.svg" class="w-5 h-5 opacity-50"><span class="text-[8px] font-black">WAZE</span></button>
                    <button class="bg-[#059669] text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-5 h-5 opacity-50"><span class="text-[8px] font-black">NORTE</span></button>
                    <button class="bg-[#059669] text-white py-3 px-1 rounded-2xl flex flex-col items-center justify-center gap-1"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-5 h-5 opacity-50"><span class="text-[8px] font-black">S.TELMO</span></button>
                </div>
            </div>
        </div>

        <!-- SECTION: MOTO -->
        <div class="space-y-4">
            <h2 class="text-xs font-black text-green-500 uppercase tracking-[0.5em] px-2">Moto (S / WAZE)</h2>
            <div class="glass p-8 rounded-[3rem] text-center space-y-6 relative border-t border-green-500/20">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">Notificar arribo a:</p>
                <div class="space-y-3">
                    <button class="w-full bg-[#059669] hover:bg-[#059669]/80 text-white py-6 rounded-[2rem] flex items-center justify-center gap-4 transition-all active:scale-95 glow-green">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-8 h-8" alt="WA">
                        <span class="text-sm font-black uppercase tracking-[0.2em]">Avisar a Norte</span>
                    </button>
                    <button class="w-full bg-[#059669] hover:bg-[#059669]/80 text-white py-6 rounded-[2rem] flex items-center justify-center gap-4 transition-all active:scale-95 glow-green">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-8 h-8" alt="WA">
                        <span class="text-sm font-black uppercase tracking-[0.2em]">Avisar a San Telmo</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- SECTION: OTROS -->
        <div class="space-y-4 opacity-40">
             <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.5em] px-2">Otros</h2>
             <div class="glass p-6 rounded-[2.5rem] flex items-center justify-between">
                <span class="text-[10px] font-black uppercase tracking-widest">Sin acciones tácticas</span>
                <button class="bg-[#059669] text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase">Notificar</button>
             </div>
        </div>

        <div class="h-10"></div>
    </div>

</body>
</html>
